<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" />
      <stop offset="50%" stop-color="#0088FF" />
      <stop offset="100%" stop-color="#000B18" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="12" />
    </filter>
  </defs>
  
  <rect width="512" height="512" fill="#000F24" />
  
  <!-- Back glow -->
  <circle cx="256" cy="256" r="180" fill="url(#blueGlow)" filter="url(#blur)" opacity="0.6" />
  
  <!-- Outer rings -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="#00D4FF" stroke-width="6" opacity="0.6" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="#0088FF" stroke-width="2" opacity="0.4" />
  
  <!-- Deep Blue Flow Swirl -->
  <path d="M 176 350 C 130 256, 380 256, 336 162" fill="none" stroke="#00A3FF" stroke-width="24" stroke-linecap="round" filter="url(#blur)" opacity="0.8"/>
  <path d="M 176 350 C 130 256, 380 256, 336 162" fill="none" stroke="#00D4FF" stroke-width="12" stroke-linecap="round" />
  <path d="M 196 380 C 100 286, 400 226, 316 132" fill="none" stroke="#0088FF" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Bubbles -->
  <circle cx="200" cy="180" r="15" fill="#00D4FF" opacity="0.9" />
  <circle cx="160" cy="220" r="8" fill="#FFFFFF" opacity="0.7" />
  <circle cx="312" cy="332" r="20" fill="#00A3FF" opacity="0.8" />
  <circle cx="352" cy="292" r="10" fill="#00D4FF" opacity="0.9" />
  <circle cx="256" cy="256" r="6" fill="#FFFFFF" opacity="0.9" />
</svg>
